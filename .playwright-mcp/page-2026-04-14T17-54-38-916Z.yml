        - generic [ref=e1366]:
          - generic [ref=e1367]:
            - generic [ref=e1368]:
              - generic [ref=e1369]: 什么是 Vidu？
              - img [ref=e1370]
            - generic [ref=e1372]:
              - generic [ref=e1374]: Vidu 是北京生数科技有限公司联合清华大学发布的中国首个长时长、高一致性、高动态性视频大模型。Vidu 可以将文本和图片转化为高质量视频，支持多种创作模式，包括文生视频、图生视频和参考生视频。Vidu 专为独立创作者和团队打造，简化了动态视频、2D 动画及多种艺术风格的制作流程，让用户轻松实现创意表达。
              - generic [ref=e1376]: Vidu 具备强大的语义理解能力和高级镜头运动设计，消除了复杂的制作流程，让创作者可以专注于创意本身。从低分辨率到高清 1080p 输出，Vidu 提供极高的灵活性和效率，为创作提供更广阔的空间。
          - generic [ref=e1377]:
            - generic [ref=e1378]:
              - generic [ref=e1379]: Vidu 的用途是什么？
              - img [ref=e1380]
            - generic [ref=e1382]:
              - generic [ref=e1383]:
                - generic [ref=e1384]: Vidu AI 是一款强大的 AI 视频生成工具，以卓越的主体一致性和高速生成能力闻名，广泛应用于多个行业，包括社交媒体内容创作、专业视频制作和商业广告等。
                - list [ref=e1386]:
