      - generic [ref=e1364]:
        - generic [ref=e1365]:
          - heading "Frequently Asked Questions" [level=2] [ref=e1366]
          - generic [ref=e1367]: Find answers to common questions about Vidu AI, including its features, usage, pricing, safety, and how to get support.
        - generic [ref=e1368]:
          - generic [ref=e1369]:
            - generic [ref=e1370]:
              - generic [ref=e1371]: What is Vidu?
              - img [ref=e1372]
            - generic [ref=e1374]:
              - generic [ref=e1376]: "Vidu is a cutting-edge AI video generator that transforms text and images into high-quality videos, supporting multiple creation modes: Text to Video, Image to Video, and Reference to Video. Designed for independent creators and teams, Vidu simplifies the production of high-quality videos, 2D animations, and diverse artistic styles, empowering users to bring their creative visions to life effortlessly."
              - generic [ref=e1378]: With robust semantic understanding and fast generation speed, Vidu eliminates production complexities, allowing creators to focus solely on their ideas. From low resolution to stunning 1080p outputs, Vidu offers unmatched flexibility and efficiency, providing a broader canvas for creativity.
          - generic [ref=e1379]:
            - generic [ref=e1380]:
              - generic [ref=e1381]: What is the use of Vidu AI?
              - img [ref=e1382]
            - generic [ref=e1384]:
              - generic [ref=e1385]:
                - generic [ref=e1386]: Vidu AI is a powerful tool for creating high-quality AI-generated videos with exceptional consistency and fast generation speed. It is widely used across various industries, from social media content creation to professional video production and commercial advertising.
                - list [ref=e1388]:
                  - listitem [ref=e1389]: Many creators use Vidu AI to produce viral videos like kissing, hugging, or fighting clips.
                  - listitem [ref=e1390]: Film studios and animation teams leverage it for studio-level 2D animations and cinematic content.
                  - listitem [ref=e1391]: Businesses also use Vidu AI to enhance marketing videos, such as image-to-video to animate product images or reference-to-video to change ad backgrounds, making video advertisements more dynamic and engaging.
              - generic [ref=e1393]: With its advanced AI capabilities, Vidu AI streamlines video production for creators, studios, and businesses.
          - generic [ref=e1394]:
            - generic [ref=e1395]:
              - generic [ref=e1396]: What's the difference between Vidu's Reference to Video and Image to Video?
              - img [ref=e1397]
            - generic [ref=e1399]:
              - generic [ref=e1400]:
                - generic [ref=e1401]: "Image to Video:"
                - list [ref=e1403]:
                  - listitem [ref=e1404]: Vidu's Image-to-Video feature allows users to create AI-generated videos from a static image, bringing them to life with motion and animation. Users can also set the first and last frames of their AI video. It streamlines the video or animation creation process—often leading to surprising and creative results.
              - generic [ref=e1405]:
                - generic [ref=e1406]: "Reference to Video:"
                - list [ref=e1408]:
                  - listitem [ref=e1409]: Reference to Video lets users upload three or more images of an object, character, or scene as references, and Vidu can combine elements into a seamless video based on a prompt. Vidu's Reference to Video also supports uploading different angles of a character or object to ensure consistency. Vidu also offers the My References feature, allowing users to save characters, props, and scenes for effortless reuse, enhancing both creative efficiency and video quality. This feature is ideal for maintaining consistency and seamlessly generating videos that blend multiple visual references.
          - generic [ref=e1410]:
            - generic [ref=e1411]:
              - generic [ref=e1412]: Is Vidu AI free to use?
              - img [ref=e1413]
            - generic [ref=e1417]: All users receive a set amount of free credits to generate videos at no cost.
          - generic [ref=e1418]:
            - generic [ref=e1419]:
              - generic [ref=e1420]: Is Vidu AI safe to use?
              - img [ref=e1421]
            - generic [ref=e1425]: Yes, Vidu AI is completely safe to use. We prioritize user data security and privacy, ensuring all uploaded content remains confidential. Vidu does not share or leak personal information. Our system is designed with robust security measures to protect your data at all times. For more details on how we handle your information, please refer to our Terms of Use.
          - generic [ref=e1426]:
            - generic [ref=e1427]:
              - generic [ref=e1428]: How can I reach out if I have more questions about Vidu?
              - img [ref=e1429]
            - generic [ref=e1432]:
              - generic [ref=e1433]: "If you have additional questions about Vidu, you can:"
              - list [ref=e1435]:
                - listitem [ref=e1436]:
                  - text: Join our Discord community at
                  - link "https://discord.gg/3pDU8fmQ8Y" [ref=e1437] [cursor=pointer]:
                    - /url: https://discord.gg/3pDU8fmQ8Y
                  - text: to connect with our team and other users for real-time support and updates.
                - listitem [ref=e1438]:
                  - text: Visit our
                  - link "Help Center" [ref=e1439] [cursor=pointer]:
                    - /url: /help-center
                  - text: for answers and support.
